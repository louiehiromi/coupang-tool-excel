<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<title>Coupang 配貨天花板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=DM+Mono:wght@300;400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --sans:'Noto Sans SC',sans-serif;
  --mono:'DM Mono',monospace;
  --bg:#f9f8f6;
  --surface:#ffffff;
  --surface2:#f4f3f1;
  --border-lo:rgba(0,0,0,.08);
  --border-md:rgba(0,0,0,.14);
  --border-hi:rgba(0,0,0,.22);
  --ink:#1a1a18;
  --ink2:#4a4a46;
  --ink3:#8a8a84;
  --ok:#519C74;
  --ok-bg:#eef7f2;
  --ok-border:rgba(81,156,116,.3);
  --warn:#9a5c00;
  --warn-bg:#fef3e2;
  --warn-border:rgba(154,92,0,.22);
  --danger:#A13925;
  --danger-bg:#f9ebe7;
  --danger-border:rgba(161,57,37,.25);
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:14px;
}

html{font-size:15px;}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  padding:40px 20px 80px;
  line-height:1.6;
  font-weight:300;
}

.wrap{max-width:840px;margin:0 auto;}

/* HEADER */
.hd{
  display:flex;justify-content:space-between;align-items:flex-end;
  padding-bottom:18px;
  border-bottom:0.5px solid var(--border-md);
  margin-bottom:36px;
  gap:16px;flex-wrap:wrap;
}
.hd-eyebrow{
  font-family:var(--mono);font-size:10px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--ink3);margin-bottom:5px;font-weight:500;
}
.hd-title{font-size:1.4rem;font-weight:500;color:var(--ink);letter-spacing:-.01em;}
.hd-tags{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.fstatus{
  font-family:var(--mono);font-size:10px;letter-spacing:.05em;
  padding:3px 9px;border-radius:20px;
  border:0.5px solid var(--border-md);
  color:var(--ink3);
  display:flex;align-items:center;gap:5px;
  transition:all .2s;
}
.fstatus-dot{width:5px;height:5px;border-radius:50%;background:var(--border-hi);flex-shrink:0;transition:background .2s;}
.fstatus.ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok);}
.fstatus.ok .fstatus-dot{background:var(--ok);}

/* SECTION */
.sec{margin-bottom:32px;}
.sec-label{
  font-family:var(--mono);font-size:10px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--ink3);
  margin-bottom:14px;font-weight:500;
}

/* UPLOAD */
.upload-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:560px){.upload-grid{grid-template-columns:1fr;}}

.upload-zone{
  background:var(--surface);
  border:0.5px solid var(--border-lo);
  border-radius:var(--radius-lg);
  padding:18px 16px 16px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:border-color .15s,background .15s;
}
.upload-zone:hover{border-color:var(--border-md);background:#fdfcfb;}
.upload-zone.loaded{background:var(--ok-bg);border-color:var(--ok-border);}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.uz-num{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-bottom:10px;letter-spacing:.08em;font-weight:500;}
.uz-label{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:3px;line-height:1.35;}
.uz-hint{font-size:11px;color:var(--ink3);font-weight:400;}
.uz-fname{font-family:var(--mono);font-size:11px;color:var(--ok);margin-top:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400;}
.uz-cta{font-family:var(--mono);font-size:11px;color:var(--ink3);margin-top:12px;letter-spacing:.03em;}

/* QUERY CARD */
.query-card{
  background:var(--surface);border:0.5px solid var(--border-lo);
  border-radius:var(--radius-lg);padding:20px 22px;
}
.query-row{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;}
.field{display:flex;flex-direction:column;gap:6px;}
.field-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);font-weight:500;}

.combo-wrap{position:relative;width:290px;}
.combo-input{
  width:100%;padding:9px 28px 9px 12px;
  border:0.5px solid var(--border-md);border-radius:var(--radius-sm);
  font-family:var(--sans);font-size:13px;font-weight:400;color:var(--ink);
  background:var(--bg);outline:none;transition:border-color .15s,box-shadow .15s;
}
.combo-input:focus{border-color:var(--border-hi);box-shadow:0 0 0 3px rgba(0,0,0,.06);}
.combo-input:disabled{color:var(--ink3);cursor:not-allowed;background:var(--surface2);}
.combo-input::placeholder{color:var(--ink3);}
.combo-arrow{position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--ink3);font-size:10px;}
.combo-dropdown{
  position:absolute;top:calc(100% + 4px);left:0;width:100%;max-height:220px;overflow-y:auto;
  background:var(--surface);border:0.5px solid var(--border-md);border-radius:var(--radius-md);
  box-shadow:0 4px 16px rgba(0,0,0,.08);z-index:99;display:none;
}
.combo-dropdown.open{display:block;}
.combo-option{
  padding:9px 14px;font-size:12px;font-weight:400;cursor:pointer;
  display:flex;gap:10px;align-items:baseline;
  border-bottom:0.5px solid var(--border-lo);
}
.combo-option:last-child{border-bottom:none;}
.combo-option:hover{background:var(--surface2);}
.opt-code{font-family:var(--mono);font-size:10px;color:var(--ink3);flex-shrink:0;}
.combo-empty{padding:12px 14px;font-size:12px;color:var(--ink3);}

.num-input{
  padding:9px 12px;
  border:0.5px solid var(--border-md);border-radius:var(--radius-sm);
  font-family:var(--mono);font-size:13px;font-weight:400;color:var(--ink);
  background:var(--bg);outline:none;transition:border-color .15s,box-shadow .15s;width:110px;
}
.num-input:focus{border-color:var(--border-hi);box-shadow:0 0 0 3px rgba(0,0,0,.06);}
.num-input:disabled{color:var(--ink3);cursor:not-allowed;background:var(--surface2);}
.num-input::placeholder{color:var(--ink3);}

.btn-row{display:flex;gap:8px;padding-bottom:1px;}
.btn{
  padding:9px 20px;border-radius:var(--radius-sm);
  font-family:var(--mono);font-size:11px;font-weight:400;letter-spacing:.08em;
  cursor:pointer;transition:all .15s;border:0.5px solid var(--border-md);
  background:transparent;color:var(--ink2);
}
.btn:hover{background:var(--surface2);border-color:var(--border-hi);}
.btn-primary{background:#212020;color:#fff;border-color:#212020;}
.btn-primary:hover{background:#3a3838;border-color:#3a3838;}
.btn-primary:disabled{background:var(--surface2);border-color:var(--border-lo);color:var(--ink3);cursor:not-allowed;}

.growth-row{
  display:flex;align-items:center;gap:14px;
  margin-top:16px;padding-top:16px;
  border-top:0.5px solid var(--border-lo);
}
.growth-label{font-family:var(--mono);font-size:10px;color:var(--ink3);letter-spacing:.08em;white-space:nowrap;font-weight:500;}
.growth-slider{flex:1;max-width:150px;accent-color:#212020;}
.growth-val{font-family:var(--mono);font-size:12px;font-weight:500;color:#212020;width:50px;}

/* RESULT */
.result{display:none;}
.result-card{
  background:var(--surface);border:0.5px solid var(--border-lo);
  border-radius:var(--radius-lg);padding:20px 22px;
}
.result-name-row{
  display:flex;align-items:baseline;gap:10px;
  padding-bottom:14px;border-bottom:0.5px solid var(--border-lo);margin-bottom:18px;
}
.result-name{font-size:15px;font-weight:500;color:var(--ink);}
.result-code{font-family:var(--mono);font-size:11px;color:var(--ink3);font-weight:400;}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
@media(max-width:520px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
.stat{background:var(--surface2);border-radius:var(--radius-md);padding:14px 14px 12px;}
.stat-l{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;font-weight:500;}
.stat-v{font-family:var(--mono);font-size:1.5rem;font-weight:500;color:var(--ink);line-height:1;}
.stat-sub{font-size:11px;color:var(--ink3);margin-top:5px;font-weight:400;}

.verdict{
  padding:12px 16px;border-radius:var(--radius-md);
  display:flex;align-items:center;gap:12px;
  font-size:13px;font-weight:400;margin-bottom:20px;
  border:0.5px solid;
}
.verdict-icon{font-family:var(--mono);font-size:11px;font-weight:500;flex-shrink:0;padding:2px 7px;border-radius:4px;background:currentColor;}
.verdict-icon-inner{mix-blend-mode:screen;font-size:11px;}
.verdict-ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok);font-weight:500;}
.verdict-ok .verdict-icon{display:none;}
.verdict-warn{background:var(--warn-bg);border-color:var(--warn-border);color:var(--warn);font-weight:500;}
.verdict-warn .verdict-icon{display:none;}
.verdict-no{background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger);font-weight:500;}
.verdict-no .verdict-icon{display:none;}
.verdict-neutral{background:var(--surface2);border-color:var(--border-lo);color:var(--ink3);}

/* YOY */
.yoy-section{display:none;}
.yoy-divider{height:0.5px;background:var(--border-lo);margin-bottom:16px;}
.yoy-label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;font-weight:500;}
.yoy-table{width:100%;border-collapse:collapse;font-size:12px;}
.yoy-table th{
  font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink3);font-weight:500;padding:6px 10px;text-align:right;
  border-bottom:0.5px solid var(--border-lo);
}
.yoy-table th:first-child{text-align:left;}
.yoy-table td{
  font-family:var(--mono);font-weight:400;padding:8px 10px;
  border-bottom:0.5px solid var(--border-lo);text-align:right;color:var(--ink);
}
.yoy-table td:first-child{text-align:left;font-family:var(--sans);font-size:12px;font-weight:400;color:var(--ink2);}
.yoy-table tr:last-child td{border-bottom:none;}
.diff-pos{color:var(--ok);}
.diff-neg{color:var(--danger);}
.muted-col{color:var(--ink3);}

/* HISTORY */
.history-card{
  background:var(--surface);border:0.5px solid var(--border-lo);
  border-radius:var(--radius-lg);overflow:hidden;
}
.history-list{display:flex;flex-direction:column;}
.history-item{
  padding:13px 18px;
  display:flex;justify-content:space-between;align-items:center;gap:16px;
  border-bottom:0.5px solid var(--border-lo);
}
.history-item:last-child{border-bottom:none;}
.history-name{font-size:13px;font-weight:400;color:var(--ink);}
.history-code{font-family:var(--mono);font-size:11px;color:var(--ink3);margin-left:8px;font-weight:400;}
.history-meta{font-family:var(--mono);font-size:11px;color:var(--ink3);margin-top:3px;font-weight:400;}
.tag{
  font-family:var(--mono);font-size:10px;letter-spacing:.06em;
  padding:3px 9px;border-radius:20px;border:0.5px solid;white-space:nowrap;font-weight:400;
}
.tag-ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok);}
.tag-warn{background:var(--warn-bg);border-color:var(--warn-border);color:var(--warn);}
.tag-no{background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger);}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="hd">
    <div>
      <div class="hd-eyebrow">配貨管理系統</div>
      <div class="hd-title">Coupang 配貨天花板</div>
    </div>
    <div class="hd-tags">
      <span class="fstatus" id="fs-ly"><span class="fstatus-dot"></span>去年銷量</span>
      <span class="fstatus" id="fs-ty"><span class="fstatus-dot"></span>今年銷量</span>
      <span class="fstatus" id="fs-mm"><span class="fstatus-dot"></span>本月配貨</span>
    </div>
  </div>

  <!-- UPLOAD -->
  <div class="sec">
    <div class="sec-label">01　上傳資料</div>
    <div class="upload-grid">

      <label class="upload-zone" id="z-ly">
        <input type="file" accept=".xlsx,.xls" id="f-ly">
        <div class="uz-num">FILE / 01</div>
        <div class="uz-label">去年同期銷量</div>
        <div class="uz-hint">ERP 銷貨單明細（去年）</div>
        <div class="uz-fname" id="fn-ly"></div>
        <div class="uz-cta">點此或拖曳上傳 →</div>
      </label>

      <label class="upload-zone" id="z-ty">
        <input type="file" accept=".xlsx,.xls" id="f-ty">
        <div class="uz-num">FILE / 02</div>
        <div class="uz-label">今年銷量</div>
        <div class="uz-hint">ERP 銷貨單明細（今年）</div>
        <div class="uz-fname" id="fn-ty"></div>
        <div class="uz-cta">點此或拖曳上傳 →</div>
      </label>

      <label class="upload-zone" id="z-mm">
        <input type="file" accept=".xlsx,.xls" id="f-mm">
        <div class="uz-num">FILE / 03</div>
        <div class="uz-label">本月已配貨</div>
        <div class="uz-hint">本月 Coupang 配貨明細</div>
        <div class="uz-fname" id="fn-mm"></div>
        <div class="uz-cta">點此或拖曳上傳 →</div>
      </label>

    </div>
  </div>

  <!-- QUERY -->
  <div class="sec">
    <div class="sec-label">02　查詢品項</div>
    <div class="query-card">
      <div class="query-row">

        <div class="field">
          <div class="field-label">品項</div>
          <div class="combo-wrap" id="combo-wrap">
            <input type="text" class="combo-input" id="combo-input"
                   placeholder="請先上傳 Excel" disabled autocomplete="off">
            <span class="combo-arrow">▾</span>
            <div class="combo-dropdown" id="combo-dd"></div>
          </div>
        </div>

        <div class="field">
          <div class="field-label">本次訂單數量</div>
          <input type="number" class="num-input" id="order-qty" placeholder="—" min="0" disabled>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" id="btn-check" disabled>查詢</button>
          <button class="btn" id="btn-clear">清除</button>
        </div>

      </div>
      <div class="growth-row">
        <span class="growth-label">成長係數</span>
        <input type="range" class="growth-slider" id="growth-slider" min="0.5" max="3" step="0.05" value="1.2">
        <span class="growth-val" id="growth-val">× 1.20</span>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="sec result" id="result-card">
    <div class="sec-label">03　查詢結果</div>
    <div class="result-card">
      <div class="result-name-row">
        <span class="result-name" id="r-name">—</span>
        <span class="result-code" id="r-code"></span>
      </div>
      <div class="stat-grid">
        <div class="stat">
          <div class="stat-l">去年同月基準</div>
          <div class="stat-v" id="r-ly">—</div>
          <div class="stat-sub" id="r-ly-sub">—</div>
        </div>
        <div class="stat">
          <div class="stat-l">天花板</div>
          <div class="stat-v" id="r-ceil">—</div>
          <div class="stat-sub" id="r-ceil-sub">去年 × 係數</div>
        </div>
        <div class="stat">
          <div class="stat-l">本月已配</div>
          <div class="stat-v" id="r-shipped">—</div>
          <div class="stat-sub">本月配貨量</div>
        </div>
        <div class="stat">
          <div class="stat-l">剩餘可配</div>
          <div class="stat-v" id="r-remain">—</div>
          <div class="stat-sub">含此次訂單後</div>
        </div>
      </div>
      <div class="verdict verdict-neutral" id="verdict">
        <span class="verdict-icon"><span class="verdict-icon-inner" id="verdict-icon">—</span></span>
        <span id="verdict-text">請先查詢品項</span>
      </div>
      <div class="yoy-section" id="yoy-section">
        <div class="yoy-divider"></div>
        <div class="yoy-label">逐月銷售比較</div>
        <table class="yoy-table">
          <thead><tr>
            <th style="text-align:left">月份</th>
            <th>去年 酷澎</th>
            <th class="muted-col">去年 momo</th>
            <th>今年 酷澎</th>
            <th class="muted-col">今年 momo</th>
            <th>酷澎 YOY</th>
          </tr></thead>
          <tbody id="yoy-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="sec" id="history-card" style="display:none">
    <div class="sec-label">查詢紀錄</div>
    <div class="history-card">
      <div class="history-list" id="history-list"></div>
    </div>
  </div>

</div>
<script>
const KEYS={LY:'cp_ly',TY:'cp_ty',MM:'cp_mm',LY_NAME:'cp_ly_name',TY_NAME:'cp_ty_name',MM_NAME:'cp_mm_name'};
let lyMap={},tyMap={},mmMap={},allItems=[],selectedCode='',history=[],growth=1.2;

const DB_NAME='coupang_tool',DB_VER=1,STORE='files';
let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>e.target.result.createObjectStore(STORE);r.onsuccess=e=>{db=e.target.result;res(db);};r.onerror=e=>rej(e);});}
function dbSet(key,val){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(val,key).onsuccess=()=>res();tx.onerror=e=>rej(e);});}
function dbGet(key){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const r=tx.objectStore(STORE).get(key);r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e);});}

function parseAnnual(wb){
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:'',raw:false});
  const map={};
  for(const row of rows){
    const code=String(row[0]||'').trim();
    if(!/^P\d+/.test(code)) continue;
    const supplier=String(row[3]||'').trim();
    const isCoupang=supplier.includes('酷澎');
    const isMomo=supplier.toLowerCase().includes('momo');
    if(!isCoupang&&!isMomo) continue;
    const name=String(row[1]||code).trim();
    const monthStr=String(row[4]||'').trim();
    const mx=monthStr.match(/\/(\d{2})\s*$/);
    const month=mx?parseInt(mx[1],10):0;
    const qty=parseInt(String(row[5]||'0').replace(/[^\d]/g,''),10)||0;
    if(!map[code]) map[code]={name,months:{},total:0,momoMonths:{}};
    if(month&&qty>0){
      if(isCoupang){map[code].months[month]=(map[code].months[month]||0)+qty;map[code].total+=qty;}
      if(isMomo){map[code].momoMonths[month]=(map[code].momoMonths[month]||0)+qty;}
    }
  }
  return map;
}

function parseMonthly(wb){
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:'',raw:false});
  const map={};
  for(const row of rows){
    const code=String(row[0]||'').trim();
    if(!/^P\d+/.test(code)) continue;
    const name=String(row[1]||code).trim();
    const qty=parseInt(String(row[2]||'0').replace(/[^\d]/g,''),10)||0;
    if(qty>0) map[code]={name,qty};
  }
  return map;
}

function buildItems(){
  const codes=new Set([...Object.keys(lyMap),...Object.keys(tyMap),...Object.keys(mmMap)]);
  allItems=[...codes].sort().map(code=>({code,name:(lyMap[code]||tyMap[code]||mmMap[code]||{}).name||code}));
  const inp=document.getElementById('combo-input');
  if(allItems.length){
    inp.disabled=false;inp.placeholder='輸入品名或編號搜尋';
    document.getElementById('order-qty').disabled=false;
    document.getElementById('btn-check').disabled=false;
  }
  renderDropdown('');
}

async function loadFile(file,type){
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array'});
  await dbSet(KEYS[type],buf);
  await dbSet(KEYS[type+'_NAME'],file.name);
  processWB(wb,type,file.name);
}

const ZONE_LABELS={'z-ly':'去年銷量','z-ty':'今年銷量','z-mm':'本月配貨'};
function processWB(wb,type,name){
  if(type==='LY'){lyMap=parseAnnual(wb);markLoaded('z-ly','fn-ly',name,'fs-ly');}
  else if(type==='TY'){tyMap=parseAnnual(wb);markLoaded('z-ty','fn-ty',name,'fs-ty');}
  else if(type==='MM'){mmMap=parseMonthly(wb);markLoaded('z-mm','fn-mm',name,'fs-mm');}
  buildItems();
}

function markLoaded(zoneId,fnId,name,fsId){
  document.getElementById(zoneId).classList.add('loaded');
  document.getElementById(fnId).textContent='✓  '+name;
  const fs=document.getElementById(fsId);
  fs.classList.add('ok');
  fs.innerHTML=`<span class="fstatus-dot"></span>${ZONE_LABELS[zoneId]}`;
}

async function restoreFromDB(){
  for(const type of ['LY','TY','MM']){
    try{
      const buf=await dbGet(KEYS[type]);
      const name=await dbGet(KEYS[type+'_NAME'])||'已載入';
      if(buf){const wb=XLSX.read(buf,{type:'array'});processWB(wb,type,name);}
    }catch(e){}
  }
}

function renderDropdown(q){
  const dd=document.getElementById('combo-dd');
  const filtered=q?allItems.filter(it=>it.name.includes(q)||it.code.toLowerCase().includes(q.toLowerCase())):allItems;
  if(!filtered.length){dd.innerHTML='<div class="combo-empty">找不到符合品項</div>';}
  else{
    dd.innerHTML=filtered.slice(0,100).map(it=>`<div class="combo-option" data-code="${it.code}"><span class="opt-code">${esc(it.code)}</span>${esc(it.name)}</div>`).join('');
    dd.querySelectorAll('.combo-option').forEach(el=>{el.addEventListener('mousedown',e=>{e.preventDefault();selectItem(el.dataset.code);});});
  }
}

function selectItem(code){
  const it=allItems.find(i=>i.code===code);
  if(!it) return;
  selectedCode=code;
  inp.value=it.name;
  inp.dataset.selected='1';
  document.getElementById('combo-dd').classList.remove('open');
}

const inp=document.getElementById('combo-input');
inp.addEventListener('input',()=>{selectedCode='';inp.dataset.selected='';renderDropdown(inp.value);document.getElementById('combo-dd').classList.add('open');});
inp.addEventListener('focus',()=>{inp.select();renderDropdown('');document.getElementById('combo-dd').classList.add('open');});
document.addEventListener('click',e=>{if(!document.getElementById('combo-wrap').contains(e.target))document.getElementById('combo-dd').classList.remove('open');});

document.getElementById('growth-slider').addEventListener('input',function(){
  growth=parseFloat(this.value);
  document.getElementById('growth-val').textContent='× '+growth.toFixed(2);
});

function getCurrentMonth(){
  let maxM=0;
  for(const d of Object.values(tyMap)){for(const m of Object.keys(d.months))if(parseInt(m)>maxM)maxM=parseInt(m);}
  return maxM||new Date().getMonth()+1;
}

document.getElementById('btn-check').addEventListener('click',doCheck);
document.getElementById('order-qty').addEventListener('keydown',e=>{if(e.key==='Enter')doCheck();});

function doCheck(){
  if(!selectedCode){
    const v=document.getElementById('combo-input').value.trim();
    const m=allItems.find(it=>it.code===v||it.name===v||v.startsWith(it.code));
    if(m) selectedCode=m.code; else return;
  }
  const code=selectedCode;
  const orderQty=parseInt(document.getElementById('order-qty').value)||0;
  const curMonth=getCurrentMonth();
  const name=(lyMap[code]||tyMap[code]||mmMap[code]||{}).name||code;
  const lyEntry=lyMap[code];
  const lyCoupang=lyEntry?(lyEntry.months[curMonth]||0):0;
  const lyMomoData=(lyMap[code]||{}).momoMonths||{};
  const lyMomo=lyMomoData[curMonth]||0;
  const baseQty=Math.max(lyCoupang,lyMomo);
  const baseSource=lyCoupang>=lyMomo?'Coupang':'momo';
  const ceil=Math.round(baseQty*growth);
  const shipped=(mmMap[code]||{}).qty||0;
  const remain=ceil-shipped-orderQty;

  document.getElementById('r-name').textContent=name;
  document.getElementById('r-code').textContent=code;
  document.getElementById('r-ly').textContent=fmt(baseQty);
  document.getElementById('r-ly-sub').textContent=`取自 ${baseSource}（C: ${fmt(lyCoupang)} / M: ${fmt(lyMomo)}）`;
  document.getElementById('r-ceil').textContent=fmt(ceil);
  document.getElementById('r-ceil-sub').textContent=`${fmt(baseQty)} × ${growth.toFixed(2)}`;
  document.getElementById('r-shipped').textContent=fmt(shipped);
  document.getElementById('r-remain').textContent=remain>=0?fmt(remain):'−'+fmt(-remain);

  const v=document.getElementById('verdict');
  const vi=document.getElementById('verdict-icon');
  const vt=document.getElementById('verdict-text');
  const total=shipped+orderQty;
  if(ceil===0){
    v.className='verdict verdict-neutral';vi.textContent='—';
    vt.textContent='去年同月 Coupang 及 momo 均無銷售紀錄，無法計算天花板。';
  } else if(total<=ceil){
    v.className='verdict verdict-ok';vi.textContent='';
    vt.textContent=`可以接單。接完後本月剩餘額度 ${fmt(ceil-total)} 件（天花板 ${fmt(ceil)} 件）。`;
  } else if(shipped>=ceil){
    v.className='verdict verdict-no';vi.textContent='';
    vt.textContent=`本月額度已滿（已配 ${fmt(shipped)} 件，天花板 ${fmt(ceil)} 件），不建議再接單。`;
  } else {
    v.className='verdict verdict-warn';vi.textContent='';
    vt.textContent=`超過天花板 ${fmt(total-ceil)} 件。本月最多還能接 ${fmt(Math.max(0,ceil-shipped))} 件。`;
  }

  buildYOY(code);
  document.getElementById('result-card').style.display='block';
  document.getElementById('result-card').scrollIntoView({behavior:'smooth',block:'nearest'});
  const status=total<=ceil&&ceil>0?'ok':ceil===0?'warn':'no';
  history.unshift({code,name,orderQty,shipped,ceil,remain,status});
  renderHistory();
  document.getElementById('history-card').style.display='block';
}

function buildYOY(code){
  const ly=(lyMap[code]||{}).months||{};
  const ty=(tyMap[code]||{}).months||{};
  const lyMomo=(lyMap[code]||{}).momoMonths||{};
  const tyMomo=(tyMap[code]||{}).momoMonths||{};
  const months=[...new Set([...Object.keys(ly),...Object.keys(ty),...Object.keys(lyMomo),...Object.keys(tyMomo)])].map(Number).sort((a,b)=>a-b);
  if(!months.length){document.getElementById('yoy-section').style.display='none';return;}
  document.getElementById('yoy-tbody').innerHTML=months.map(m=>{
    const l=ly[m]||0,t=ty[m]||0;
    const ml=lyMomo[m]||0,mt=tyMomo[m]||0;
    const yoyPct=(l>0&&t>0)?Math.round((t-l)/l*100):null;
    const dcls=yoyPct===null?'':yoyPct>0?'diff-pos':yoyPct<0?'diff-neg':'';
    const yoyStr=yoyPct===null?'—':(yoyPct>0?'+':'')+yoyPct+'%';
    return `<tr>
      <td>${m}月</td>
      <td>${l>0?fmt(l):'—'}</td>
      <td class="muted-col">${ml>0?fmt(ml):'—'}</td>
      <td style="color:${t>0?'#378add':'inherit'}">${t>0?fmt(t):'—'}</td>
      <td class="muted-col" style="color:${mt>0?'#85b7eb':'inherit'}">${mt>0?fmt(mt):'—'}</td>
      <td class="${dcls}">${yoyStr}</td>
    </tr>`;
  }).join('');
  document.getElementById('yoy-section').style.display='block';
}

function renderHistory(){
  const el=document.getElementById('history-list');
  if(!history.length){el.innerHTML='';return;}
  el.innerHTML=history.map(h=>{
    const tagTxt={ok:'可接單',warn:'無紀錄',no:'不可接單'}[h.status];
    return `<div class="history-item">
      <div>
        <div class="history-name">${esc(h.name)}<span class="history-code">${esc(h.code)}</span></div>
        <div class="history-meta">訂單 ${fmt(h.orderQty)}　已配 ${fmt(h.shipped)}　天花板 ${fmt(h.ceil)}</div>
      </div>
      <span class="tag tag-${h.status}">${tagTxt}</span>
    </div>`;
  }).join('');
}

document.getElementById('btn-clear').addEventListener('click',()=>{
  history=[];renderHistory();
  document.getElementById('history-card').style.display='none';
  document.getElementById('result-card').style.display='none';
});

[['f-ly','LY'],['f-ty','TY'],['f-mm','MM']].forEach(([id,type])=>{
  document.getElementById(id).addEventListener('change',async function(){
    if(this.files[0]) await loadFile(this.files[0],type);
    this.value='';
  });
});

function fmt(n){return Number(n||0).toLocaleString('zh-TW');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

openDB().then(restoreFromDB);
</script>
