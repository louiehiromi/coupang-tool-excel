<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酷澎配貨計算工具</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; color: #1a1a1a; }
.card { background: #fff; border-radius: 16px; border: 0.5px solid #e0ddd5; padding: 2rem; width: 100%; max-width: 700px; height: fit-content; }
.page-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: #888780; margin-bottom: 2rem; }
.section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: #888780; margin: 0 0 10px; }
.upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 0.5rem; }
.upload-zone { border: 1.5px dashed #c8c5bc; border-radius: 12px; padding: 1.25rem 1rem; text-align: center; cursor: pointer; transition: background 0.15s; }
.upload-zone:hover, .upload-zone.dragover { background: #f5f4f0; }
.upload-zone.loaded { border-style: solid; border-color: #639922; }
.upload-zone i { font-size: 22px; color: #888780; display: block; margin-bottom: 6px; }
.upload-zone .uz-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.upload-zone .uz-sub { font-size: 12px; color: #888780; }
.upload-zone.loaded .uz-sub { color: #3b6d11; }
.cache-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; margin-bottom: 0.5rem; }
.cache-info { font-size: 12px; color: #888780; }
.cache-info span { color: #3b6d11; }
.clear-btn { font-size: 12px; color: #a32d2d; cursor: pointer; background: none; border: none; padding: 0; }
.clear-btn:hover { text-decoration: underline; }
.divider { border: none; border-top: 0.5px solid #e8e5de; margin: 1.5rem 0; }
.search-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.search-row i { font-size: 16px; color: #b4b2a9; flex-shrink: 0; }
.search-row input { flex: 1; padding: 7px 10px; font-size: 13px; border: 0.5px solid #c8c5bc; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; }
.search-row input:focus { border-color: #888780; }
.pill-wrap { display: flex; gap: 6px; flex-wrap: wrap; max-height: 108px; overflow-y: auto; margin-bottom: 1.5rem; }
.pill { font-size: 12px; padding: 4px 12px; border-radius: 99px; border: 0.5px solid #c8c5bc; background: #fff; color: #888780; cursor: pointer; transition: all 0.1s; white-space: nowrap; }
.pill:hover { background: #f5f4f0; }
.pill.active { background: #f5f4f0; color: #1a1a1a; border-color: #888780; font-weight: 500; }
.pill.hide { display: none; }
.no-result { font-size: 13px; color: #b4b2a9; display: none; margin-bottom: 1rem; }
.tab-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.tab-row { display: flex; gap: 6px; }
.tab { font-size: 12px; padding: 4px 14px; border-radius: 99px; border: 0.5px solid #c8c5bc; background: #fff; color: #888780; cursor: pointer; }
.tab.active { background: #f5f4f0; color: #1a1a1a; border-color: #888780; font-weight: 500; }
.month-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 1.5rem; }
.month-table th { font-size: 11px; font-weight: 500; color: #888780; text-align: right; padding: 6px 8px; border-bottom: 0.5px solid #e8e5de; }
.month-table th:first-child { text-align: left; }
.month-table td { padding: 7px 8px; border-bottom: 0.5px solid #e8e5de; text-align: right; color: #1a1a1a; }
.month-table td:first-child { text-align: left; }
.month-table tr:last-child td { border-bottom: none; }
.nd { color: #b4b2a9; } .up { color: #3b6d11; } .dn { color: #a32d2d; } .cy { color: #185fa5; }
.summary-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1.5rem; }
.metric { background: #f5f4f0; border-radius: 8px; padding: 12px 14px; border: 0.5px solid transparent; }
.metric.hi { border-color: #378add; }
.metric.hi .m-label { color: #185fa5; }
.metric .m-label { font-size: 12px; color: #888780; margin-bottom: 4px; }
.metric .m-val { font-size: 20px; font-weight: 500; color: #1a1a1a; }
.metric .m-sub { font-size: 11px; color: #b4b2a9; margin-top: 2px; }
.growth-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
.growth-row label { font-size: 13px; color: #888780; white-space: nowrap; }
.growth-row input[type=range] { flex: 1; accent-color: #1a1a1a; }
.growth-val { font-size: 14px; font-weight: 500; min-width: 80px; color: #1a1a1a; }
.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
.input-group { display: flex; flex-direction: column; gap: 5px; }
.input-group label { font-size: 13px; color: #888780; }
.input-group input { padding: 7px 10px; font-size: 14px; border: 0.5px solid #c8c5bc; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; }
.input-group input:focus { border-color: #888780; }
.verdict { border-radius: 8px; padding: 14px 16px; display: flex; align-items: flex-start; gap: 10px; margin-top: 1rem; }
.v-neutral { background: #f5f4f0; } .v-ok { background: #eaf3de; } .v-no { background: #fcebeb; }
.vi { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.v-neutral .vi, .v-neutral .vb { color: #888780; }
.v-ok .vi, .v-ok .vb { color: #3b6d11; }
.v-no .vi, .v-no .vb { color: #a32d2d; }
.vb { font-size: 14px; line-height: 1.5; }
.hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="page-title">酷澎配貨計算工具</div>
  <div class="page-sub">上傳 Ecount 銷售報表，依品項計算配貨天花板。三份報表都會自動記憶，重新整理或下次開啟不需重新上傳。</div>

  <p class="section-label">銷售報表（更新資料時才需要重新上傳）</p>
  <div class="upload-row">
    <div class="upload-zone" id="zone-yoy" onclick="document.getElementById('input-yoy').click()">
      <i class="ti ti-calendar-minus"></i>
      <div class="uz-title">去年銷售報表</div>
      <div class="uz-sub" id="sub-yoy">點擊上傳 .xlsx</div>
    </div>
    <div class="upload-zone" id="zone-this" onclick="document.getElementById('input-this').click()">
      <i class="ti ti-calendar-stats"></i>
      <div class="uz-title">今年銷售報表</div>
      <div class="uz-sub" id="sub-this">點擊上傳 .xlsx</div>
    </div>
  </div>
  <input type="file" id="input-yoy" accept=".xls,.xlsx" style="display:none">
  <input type="file" id="input-this" accept=".xls,.xlsx" style="display:none">

  <p class="section-label" style="margin-top:1rem">本月已接訂單（有新資料才需要重新上傳）</p>
  <div class="upload-zone" id="zone-month" onclick="document.getElementById('input-month').click()" style="text-align:left;display:flex;align-items:center;gap:12px;padding:0.9rem 1rem;">
    <i class="ti ti-file-invoice" style="font-size:20px;color:#888780;flex-shrink:0;margin:0"></i>
    <div>
      <div class="uz-title">本月酷澎訂單報表</div>
      <div class="uz-sub" id="sub-month">點擊上傳 .xlsx（自動記憶）</div>
    </div>
  </div>
  <input type="file" id="input-month" accept=".xls,.xlsx" style="display:none">

  <div class="cache-bar" id="cache-bar" style="display:none">
    <div class="cache-info" id="cache-info"></div>
    <button class="clear-btn" onclick="clearCache()"><i class="ti ti-trash" style="font-size:12px;vertical-align:-1px"></i> 清除資料</button>
  </div>

  <div id="main-content" class="hidden">
    <hr class="divider">
    <p class="section-label">選擇品項</p>
    <div class="search-row">
      <i class="ti ti-search"></i>
      <input type="text" id="psearch" placeholder="輸入關鍵字，按 Enter 篩選">
    </div>
    <div class="pill-wrap" id="pill-wrap"></div>
    <div class="no-result" id="no-result">找不到符合的品項</div>

    <hr class="divider">
    <div class="tab-header">
      <p class="section-label" style="margin:0">月銷售對照</p>
      <div class="tab-row">
        <div class="tab active" id="tab-cp" onclick="switchTab('cp')">酷澎</div>
        <div class="tab" id="tab-mo" onclick="switchTab('mo')">momo</div>
        <div class="tab" id="tab-both" onclick="switchTab('both')">兩者</div>
      </div>
    </div>
    <table class="month-table">
      <thead id="month-thead"></thead>
      <tbody id="month-tbody"></tbody>
    </table>

    <div class="summary-grid">
      <div class="metric" id="card-yoy">
        <div class="m-label">去年月均（酷澎）</div>
        <div class="m-val" id="m-yoy-avg">—</div>
        <div class="m-sub" id="m-yoy-sub"></div>
      </div>
      <div class="metric" id="card-this">
        <div class="m-label">今年月均（酷澎）</div>
        <div class="m-val" id="m-this-avg">—</div>
        <div class="m-sub" id="m-this-sub"></div>
      </div>
      <div class="metric">
        <div class="m-label">天花板</div>
        <div class="m-val" id="m-ceiling">—</div>
        <div class="m-sub">取高值 × 成長係數</div>
      </div>
    </div>

    <div class="growth-row">
      <label>成長係數</label>
      <input type="range" id="growth" min="0.5" max="2.0" step="0.05" value="1.2" oninput="updateGrowth()">
      <span class="growth-val" id="growth-val">× 1.20 (+20%)</span>
    </div>

    <hr class="divider">
    <p class="section-label">輸入訂單資訊（酷澎）</p>
    <div class="input-row">
      <div class="input-group">
        <label>本月已接訂單數量</label>
        <input type="number" id="order-now" min="0" placeholder="0" oninput="calc()">
      </div>
      <div class="input-group">
        <label>這筆新訂單數量</label>
        <input type="number" id="order-new" min="0" placeholder="0" oninput="calc()">
      </div>
    </div>
    <div class="verdict v-neutral" id="verdict">
      <i class="ti ti-minus vi"></i>
      <div class="vb">填入訂單數量後，這裡會告訴你能不能接單</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
var dataYoy={cp:{},mo:{}},dataThis={cp:{},mo:{}},dataMonth={};
var selectedProduct=null,baseVal=0,currentTab='cp';
var pendingYoyName='',pendingThisName='',pendingMonthName='';
var STORAGE_KEY='coupang_tool_data_v4';

function isCoupang(s){return String(s).indexOf('酷澎')!==-1;}
function isMomo(s){return String(s).indexOf('momo')!==-1;}
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}
function hasYoy(){return Object.keys(dataYoy.cp).length>0||Object.keys(dataYoy.mo).length>0;}
function hasThis(){return Object.keys(dataThis.cp).length>0||Object.keys(dataThis.mo).length>0;}

function cleanDataNames(data){
  var result={cp:{},mo:{}};
  ['cp','mo'].forEach(function(ch){
    Object.keys(data[ch]||{}).forEach(function(k){
      var clean=k.replace(/\s*\[.*$/,'').trim();
      if(!result[ch][clean])result[ch][clean]=[];
      result[ch][clean]=result[ch][clean].concat(data[ch][k]);
    });
  });
  return result;
}

(function init(){
  try{
    var raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return;
    var saved=JSON.parse(raw);
    if(saved.yoy&&saved.this&&saved.savedAt){
      dataYoy=cleanDataNames(saved.yoy);
      dataThis=cleanDataNames(saved.this);
      pendingYoyName=saved.yoyName||'去年報表';
      pendingThisName=saved.thisName||'今年報表';
      markLoaded('zone-yoy','sub-yoy',saved.yoyName);
      markLoaded('zone-this','sub-this',saved.thisName);
      if(saved.month&&Object.keys(saved.month).length>0){
        dataMonth=saved.month;
        pendingMonthName=saved.monthName||'本月報表';
        markLoaded('zone-month','sub-month',pendingMonthName+'（'+Object.keys(dataMonth).length+' 品項）');
      }
      showCacheBar(saved.savedAt);
      buildUI();
    }
  }catch(e){}
})();

function markLoaded(zoneId,subId,name){
  document.getElementById(zoneId).classList.add('loaded');
  document.getElementById(subId).textContent='✓ '+name;
}

function showCacheBar(savedAt){
  var bar=document.getElementById('cache-bar');
  bar.style.display='flex';
  var d=new Date(savedAt);
  var ds=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
  document.getElementById('cache-info').innerHTML='<span>已載入上次資料</span>　儲存於 '+ds;
}

function clearCache(){
  if(!confirm('確定要清除儲存的資料嗎？'))return;
  localStorage.removeItem(STORAGE_KEY);
  dataYoy={cp:{},mo:{}}; dataThis={cp:{},mo:{}}; dataMonth={};
  document.getElementById('cache-bar').style.display='none';
  hide('main-content');
  ['zone-yoy','zone-this','zone-month'].forEach(function(id){document.getElementById(id).classList.remove('loaded');});
  document.getElementById('sub-yoy').textContent='點擊上傳 .xlsx';
  document.getElementById('sub-this').textContent='點擊上傳 .xlsx';
  document.getElementById('sub-month').textContent='點擊上傳 .xlsx（自動記憶）';
}

function saveToStorage(){
  try{
    var payload={
      yoy:dataYoy, this:dataThis, month:dataMonth,
      savedAt:Date.now(),
      yoyName:pendingYoyName, thisName:pendingThisName, monthName:pendingMonthName
    };
    localStorage.setItem(STORAGE_KEY,JSON.stringify(payload));
  }catch(e){}
}

function setupZone(zoneId,inputId,subId,key){
  var zone=document.getElementById(zoneId);
  document.getElementById(inputId).addEventListener('change',function(){handleFile(this.files[0],subId,zoneId,key);});
  zone.addEventListener('dragover',function(e){e.preventDefault();zone.classList.add('dragover');});
  zone.addEventListener('dragleave',function(){zone.classList.remove('dragover');});
  zone.addEventListener('drop',function(e){e.preventDefault();zone.classList.remove('dragover');handleFile(e.dataTransfer.files[0],subId,zoneId,key);});
}
setupZone('zone-yoy','input-yoy','sub-yoy','yoy');
setupZone('zone-this','input-this','sub-this','this');

var zoneMonth=document.getElementById('zone-month');
document.getElementById('input-month').addEventListener('change',function(){handleMonthFile(this.files[0]);});
zoneMonth.addEventListener('dragover',function(e){e.preventDefault();zoneMonth.classList.add('dragover');});
zoneMonth.addEventListener('dragleave',function(){zoneMonth.classList.remove('dragover');});
zoneMonth.addEventListener('drop',function(e){e.preventDefault();zoneMonth.classList.remove('dragover');handleMonthFile(e.dataTransfer.files[0]);});

function handleFile(file,subId,zoneId,key){
  if(!file)return;
  document.getElementById(subId).textContent='讀取中…';
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      var parsed=parseRows(rows);
      var cpCount=Object.keys(parsed.cp).length;
      if(key==='yoy'){dataYoy=parsed;pendingYoyName=file.name;}
      else{dataThis=parsed;pendingThisName=file.name;}
      document.getElementById(subId).textContent='✓ '+file.name+'（酷澎 '+cpCount+' 品項）';
      document.getElementById(zoneId).classList.add('loaded');
      // 只要去年或今年任一份有資料就存檔並顯示
      if(hasYoy()&&hasThis()){
        saveToStorage();
        showCacheBar(Date.now());
        buildUI();
      } else {
        saveToStorage();
      }
    }catch(err){
      document.getElementById(subId).textContent='讀取失敗：'+err.message;
    }
  };
  reader.readAsArrayBuffer(file);
}

function handleMonthFile(file){
  if(!file)return;
  document.getElementById('sub-month').textContent='讀取中…';
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      dataMonth={};
      for(var i=0;i<rows.length;i++){
        var row=rows[i];
        var c0=String(row[0]||'').trim(),c1=String(row[1]||'').trim();
        if(!c0||c0==='按品項'||c0==='品項名稱(規格)'||c0.indexOf('合計')!==-1)continue;
        var name=c0.replace(/\s*\[.*$/,'').trim();
        var qty=parseFloat(c1)||0;
        if(qty>0)dataMonth[name]=qty;
      }
      pendingMonthName=file.name;
      var count=Object.keys(dataMonth).length;
      document.getElementById('sub-month').textContent='✓ '+file.name+'（'+count+' 品項）';
      document.getElementById('zone-month').classList.add('loaded');
      saveToStorage();
      if(selectedProduct)applyMonthData(selectedProduct);
    }catch(err){
      document.getElementById('sub-month').textContent='讀取失敗：'+err.message;
    }
  };
  reader.readAsArrayBuffer(file);
}

function applyMonthData(name){
  var cleanName=name.replace(/\s*\[.*$/,'').trim();
  var qty=dataMonth[cleanName]||dataMonth[name]||0;
  document.getElementById('order-now').value=qty>0?qty:'';
  calc();
}

function parseRows(rows){
  var cp={},mo={};
  for(var i=0;i<rows.length;i++){
    var row=rows[i];
    var c0=String(row[0]||'').trim(),c1=String(row[1]||'').trim();
    var c2=String(row[2]||'').trim(),c3=String(row[3]||'').trim();
    if(!c0||c0==='按品項'||c0.indexOf('合計')!==-1||c1.indexOf('合計')!==-1)continue;
    if(!c1||!c2||!c3)continue;
    if(!/^\d{4}\/\d{2}/.test(c2))continue;
    var qty=parseFloat(c3)||0; if(qty<=0)continue;
    var pname=c0.replace(/\s*\[.*$/,'').trim();
    if(isCoupang(c1)){if(!cp[pname])cp[pname]=[];cp[pname].push({month:c2.trim(),qty:qty});}
    else if(isMomo(c1)){if(!mo[pname])mo[pname]=[];mo[pname].push({month:c2.trim(),qty:qty});}
  }
  return{cp:cp,mo:mo};
}

var psearch=document.getElementById('psearch');
psearch.addEventListener('keydown',function(e){if(e.key==='Enter')filterPills(this.value.trim());});
psearch.addEventListener('input',function(){if(this.value==='')filterPills('');});

function filterPills(kw){
  var kl=kw.toLowerCase(),any=false;
  document.querySelectorAll('#pill-wrap .pill').forEach(function(p){
    var match=!kl||p.textContent.toLowerCase().indexOf(kl)!==-1;
    p.classList.toggle('hide',!match);
    if(match)any=true;
  });
  document.getElementById('no-result').style.display=any?'none':'block';
}

function buildUI(){
  var all={};
  [dataYoy,dataThis].forEach(function(d){
    Object.keys(d.cp).forEach(function(p){all[p]=1;});
    Object.keys(d.mo).forEach(function(p){all[p]=1;});
  });
  var products=Object.keys(all).sort();
  show('main-content');
  var wrap=document.getElementById('pill-wrap');
  wrap.innerHTML=''; psearch.value='';
  document.getElementById('no-result').style.display='none';
  products.forEach(function(p){
    var pill=document.createElement('div');
    pill.className='pill'; pill.textContent=p;
    pill.onclick=function(){selectProduct(p);};
    wrap.appendChild(pill);
  });
  if(selectedProduct&&all[selectedProduct])selectProduct(selectedProduct);
  else if(products.length>0)selectProduct(products[0]);
}

function switchTab(t){
  currentTab=t;
  ['cp','mo','both'].forEach(function(id){document.getElementById('tab-'+id).classList.toggle('active',id===t);});
  if(selectedProduct)selectProduct(selectedProduct);
}

function getMonthNum(m){return parseInt((m||'').replace(/\s/g,'').split('/')[1]||'0');}
function buildMap(entries){var m={};(entries||[]).forEach(function(e){m[getMonthNum(e.month)]=e.qty;});return m;}

function selectProduct(name){
  selectedProduct=name;
  document.querySelectorAll('.pill').forEach(function(el){el.classList.toggle('active',el.textContent===name);});
  var yCp=buildMap(dataYoy.cp[name]),tCp=buildMap(dataThis.cp[name]);
  var yMo=buildMap(dataYoy.mo[name]),tMo=buildMap(dataThis.mo[name]);
  var monthNums={};
  [yCp,tCp,yMo,tMo].forEach(function(m){Object.keys(m).forEach(function(k){monthNums[k]=1;});});
  var months=Object.keys(monthNums).map(Number).sort(function(a,b){return a-b;});
  var thead=document.getElementById('month-thead'),tbody=document.getElementById('month-tbody');
  thead.innerHTML=''; tbody.innerHTML='';
  var hr=document.createElement('tr');
  if(currentTab==='both')hr.innerHTML='<th>月份</th><th>去年 酷澎</th><th>去年 momo</th><th>今年 酷澎</th><th>今年 momo</th><th>酷澎 YOY</th>';
  else{var lbl=currentTab==='cp'?'酷澎':'momo';hr.innerHTML='<th>月份</th><th>去年 '+lbl+'</th><th>今年 '+lbl+'</th><th>增減</th><th>YOY %</th>';}
  thead.appendChild(hr);
  var cpYT=0,cpYC=0,cpTT=0,cpTC=0;
  months.forEach(function(mn){
    var ycp=yCp[mn]!==undefined?yCp[mn]:null,tcp=tCp[mn]!==undefined?tCp[mn]:null;
    var ymo=yMo[mn]!==undefined?yMo[mn]:null,tmo=tMo[mn]!==undefined?tMo[mn]:null;
    if(ycp!==null){cpYT+=ycp;cpYC++;} if(tcp!==null){cpTT+=tcp;cpTC++;}
    function fmt(v,c){return v!==null?'<span class="'+(c||'')+'">'+v.toLocaleString()+'</span>':'<span class="nd">—</span>';}
    function fmtD(a,b){if(a===null||b===null)return'<span class="nd">—</span>';var d=b-a,s=d>=0?'+':'',c=d>=0?'up':'dn';return'<span class="'+c+'">'+(s+d.toLocaleString())+'</span>';}
    function fmtP(a,b){if(a===null||b===null||a===0)return'<span class="nd">—</span>';var p=Math.round((b-a)/a*100),s=p>=0?'+':'',c=p>=0?'up':'dn';return'<span class="'+c+'">'+(s+p)+'%</span>';}
    var row=document.createElement('tr');
    if(currentTab==='both')row.innerHTML='<td>'+mn+' 月</td><td>'+fmt(ycp)+'</td><td>'+fmt(ymo)+'</td><td>'+fmt(tcp,'cy')+'</td><td>'+fmt(tmo,'cy')+'</td><td>'+fmtP(ycp,tcp)+'</td>';
    else if(currentTab==='cp')row.innerHTML='<td>'+mn+' 月</td><td>'+fmt(ycp)+'</td><td>'+fmt(tcp,'cy')+'</td><td>'+fmtD(ycp,tcp)+'</td><td>'+fmtP(ycp,tcp)+'</td>';
    else row.innerHTML='<td>'+mn+' 月</td><td>'+fmt(ymo)+'</td><td>'+fmt(tmo,'cy')+'</td><td>'+fmtD(ymo,tmo)+'</td><td>'+fmtP(ymo,tmo)+'</td>';
    tbody.appendChild(row);
  });
  var cpYoyAvg=cpYC>0?Math.round(cpYT/cpYC):0,cpThisAvg=cpTC>0?Math.round(cpTT/cpTC):0;
  baseVal=Math.max(cpYoyAvg,cpThisAvg);
  document.getElementById('m-yoy-avg').textContent=cpYoyAvg.toLocaleString()+' 件';
  document.getElementById('m-yoy-sub').textContent=cpYC+' 個月資料';
  document.getElementById('m-this-avg').textContent=cpThisAvg.toLocaleString()+' 件';
  document.getElementById('m-this-sub').textContent=cpTC+' 個月資料';
  document.getElementById('card-yoy').classList.toggle('hi',cpYoyAvg>=cpThisAvg&&cpYoyAvg>0);
  document.getElementById('card-this').classList.toggle('hi',cpThisAvg>cpYoyAvg);
  document.getElementById('order-now').value='';
  document.getElementById('order-new').value='';
  if(Object.keys(dataMonth).length>0)applyMonthData(name);
  else updateGrowth();
}

function updateGrowth(){
  var g=parseFloat(document.getElementById('growth').value);
  var p=Math.round((g-1)*100);
  document.getElementById('growth-val').textContent='× '+g.toFixed(2)+' ('+(p>=0?'+':'')+p+'%)';
  calc();
}

function calc(){
  var g=parseFloat(document.getElementById('growth').value);
  var ceiling=Math.round(baseVal*g);
  document.getElementById('m-ceiling').textContent=ceiling.toLocaleString()+' 件';
  var now=parseInt(document.getElementById('order-now').value)||0;
  var nw=parseInt(document.getElementById('order-new').value)||0;
  var tot=now+nw;
  var v=document.getElementById('verdict'),ic=v.querySelector('.vi'),bd=v.querySelector('.vb');
  if(now===0&&nw===0){v.className='verdict v-neutral';ic.className='ti ti-minus vi';bd.textContent='填入訂單數量後，這裡會告訴你能不能接單';}
  else if(now>=ceiling){v.className='verdict v-no';ic.className='ti ti-x vi';bd.textContent='本月額度已滿（已接 '+now.toLocaleString()+' 件 / 天花板 '+ceiling.toLocaleString()+' 件），不建議再接單。';}
  else if(tot<=ceiling){v.className='verdict v-ok';ic.className='ti ti-check vi';bd.textContent='可以接單。接完後本月剩餘額度 '+(ceiling-tot).toLocaleString()+' 件（天花板 '+ceiling.toLocaleString()+' 件）。';}
  else{v.className='verdict v-no';ic.className='ti ti-x vi';bd.textContent='超過天花板 '+(tot-ceiling).toLocaleString()+' 件。本月最多還能接 '+Math.max(0,ceiling-now).toLocaleString()+' 件。';}
}
</script>
</body>
</html>
